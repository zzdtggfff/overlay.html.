<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay YouTube</title>
<style>
  body, html { margin: 0; padding: 0; overflow: hidden; background: transparent; }
  iframe { position: absolute; border: none; }
  #donate { top: 0; left: 0; width: 100%; height: 33%; }
  #goal   { top: 33%; left: 0; width: 100%; height: 33%; }
  #subs   { top: 66%; left: 0; width: 100%; height: 34%; }
</style>
</head>
<body>

<!-- Донаты -->
<iframe id="donate" src="https://www.donationalerts.com/widget/alerts?group_id=1&token=cBTL83ouVpdMwemEeNdm"></iframe>

<!-- Сбор средств -->
<iframe id="goal" src="https://www.donationalerts.com/widget/goal/8037486?token=cBTL83ouVpdMwemEeNdm"></iframe>

<!-- Подписки -->
<iframe id="subs" src="https://www.donationalerts.com/widget/alerts?group_id=2&token=cBTL83ouVpdMwemEeNdm"></iframe>

</body>
</html>
